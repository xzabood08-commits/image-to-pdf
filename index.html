<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول PDF الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: var(--text); padding: 20px; margin: 0; min-height: 100vh;
        }

        /* هنا جعلنا البطاقة تأخذ كامل عرض الشاشة مع هوامش بسيطة */
        .container { 
            background: var(--card); padding: 40px; border-radius: 30px; 
            width: 95%; /* أخذ كامل العرض تقريباً */
            margin: 0 auto; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 { font-size: 2rem; margin-bottom: 30px; }

        .upload-area { 
            border: 4px dashed #6366f1; padding: 60px 20px; border-radius: 20px; 
            cursor: pointer; margin-bottom: 30px; transition: 0.3s;
        }

        .btn-main { 
            background: var(--primary); color: white; padding: 20px; 
            border-radius: 15px; border: none; font-size: 1.2rem; 
            width: 100%; cursor: pointer; font-weight: bold;
        }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* شبكة مرنة */
            gap: 20px; margin: 30px 0; 
        }
        .img-card { position: relative; border-radius: 15px; overflow: hidden; border: 3px solid var(--primary); }
        .img-card img { width: 100%; height: 200px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <h2>أداة تحويل الصور إلى PDF 📄</h2>
        
        <button onclick="toggleTheme()" style="padding: 10px 20px; margin-bottom: 20px; border-radius: 10px; border: none; cursor: pointer;">🌓 الوضع الليلي</button>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            📂 اضغط هنا لاختيار صورك
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles()">
        </div>

        <div class="gallery" id="gallery"></div>
        
        <button class="btn-main" onclick="generatePDF()">توليد ملف PDF النهائي</button>
    </div>

    <script>
        let selectedFiles = [];
        function toggleTheme() { document.body.classList.toggle('dark'); }

        function handleFiles() {
            const files = Array.from(document.getElementById('fileInput').files);
            selectedFiles = [...selectedFiles, ...files];
            renderGallery();
        }

        function renderGallery() {
            const g = document.getElementById('gallery');
            g.innerHTML = '';
            selectedFiles.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'img-card';
                div.innerHTML = `<img src="${URL.createObjectURL(f)}"><button onclick="removeFile(${i})" style="position:absolute; top:5px; right:5px; background:red; border:none; color:white; border-radius:50%; width:30px; height:30px;">×</button>`;
                g.appendChild(div);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderGallery();
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            for (let i = 0; i < selectedFiles.length; i++) {
                const imgData = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = e => r(e.target.result);
                    reader.readAsDataURL(selectedFiles[i]);
                });
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 10, 10, 180, 250);
            }
            doc.save("ملفي_الاحترافي.pdf");
        }
    </script>
</body>
</html>
