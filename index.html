<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محول PDF الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        .container { background: var(--card); padding: 30px; border-radius: 30px; max-width: 600px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin: 20px 0; }
        .img-card { position: relative; border-radius: 10px; overflow: hidden; border: 2px solid var(--primary); }
        .img-card img { width: 100%; height: 100px; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; cursor: pointer; border-radius: 50%; width: 20px; }
        button { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>محول PDF الذكي</h2>
        <button onclick="toggleTheme()">🌓 تبديل الوضع الليلي</button>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()" style="border: 2px dashed #6366f1; padding: 30px; text-align: center; margin: 20px 0; cursor: pointer;">
            📂 اختر الصور
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles()">
        </div>
        <div class="gallery" id="gallery"></div>
        <button onclick="generatePDF()" style="background: var(--primary); color: white;">توليد PDF النهائي</button>
    </div>

    <script>
        let selectedFiles = [];
        function toggleTheme() { document.body.classList.toggle('dark'); }

        function handleFiles() {
            const files = Array.from(document.getElementById('fileInput').files);
            selectedFiles = [...selectedFiles, ...files];
            renderGallery();
        }

        function renderGallery() {
            const g = document.getElementById('gallery');
            g.innerHTML = '';
            selectedFiles.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'img-card';
                div.innerHTML = `<img src="${URL.createObjectURL(f)}"><button class="del-btn" onclick="removeFile(${i})">×</button>`;
                g.appendChild(div);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderGallery();
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            for (let i = 0; i < selectedFiles.length; i++) {
                const imgData = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = e => r(e.target.result);
                    reader.readAsDataURL(selectedFiles[i]);
                });
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 10, 10, 180, 250);
            }
            doc.save("ملفي.pdf");
        }
    </script>
</body>
</html>
